name: Render and publish SST report

on:
  schedule:
    - cron: '0 23 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  render:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: 'release'

      - uses: r-lib/actions/setup-pandoc@v2

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libcurl4-openssl-dev \
            libssl-dev \
            libxml2-dev \
            libfontconfig1-dev \
            libfreetype6-dev \
            libpng-dev \
            libtiff5-dev \
            libjpeg-dev \
            libharfbuzz-dev \
            libfribidi-dev \
            libnetcdf-dev \
            libudunits2-dev \
            libgdal-dev \
            libgeos-dev \
            libproj-dev

      - name: Install R packages
        shell: Rscript {0}
        run: |
          lib <- Sys.getenv("R_LIBS_USER")
          dir.create(lib, recursive = TRUE, showWarnings = FALSE)
          install.packages(
            c('knitr',
              'ggplot2', 'dplyr', 'tidyr', 'lubridate', 'readr', 'purrr',
              'ggsci', 'rerddap'),
            lib = lib,
            repos = 'https://cloud.r-project.org',
            dependencies = c('Depends', 'Imports', 'LinkingTo')
          )
          missing <- c('ggplot2', 'dplyr', 'lubridate', 'ggsci', 'rerddap', 'giscoR')[
            !c('rmarkdown', 'ggplot2', 'dplyr', 'lubridate', 'ggsci', 'rerddap') %in%
            rownames(installed.packages(lib.loc = lib))
          ]
          if (length(missing) > 0) stop("Failed to install: ", paste(missing, collapse = ", "))
          cat("All packages installed successfully\n")
          
      - name: Install rmarkdown
        shell: Rscript {0}
        run: |
          lib <- Sys.getenv("R_LIBS_USER")
          install.packages('rmarkdown', lib = lib, repos = 'https://cloud.r-project.org')
          cat("rmarkdown installed:", "rmarkdown" %in% rownames(installed.packages(lib.loc = lib)), "\n")

      - name: Install giscoR
        shell: Rscript {0}
        run: |
          lib <- Sys.getenv("R_LIBS_USER")
          install.packages('giscoR', lib = lib, repos = 'https://cloud.r-project.org')
          cat("giscoR installed:", "giscoR" %in% rownames(installed.packages(lib.loc = lib)), "\n")

      - name: Diagnose library
        shell: Rscript {0}
        run: |
          cat("R_LIBS_USER:", Sys.getenv("R_LIBS_USER"), "\n")
          cat("libPaths:\n")
          print(.libPaths())
          cat("rmarkdown installed:", "rmarkdown" %in% rownames(installed.packages()), "\n")

      - name: Test ERDDAP connectivity
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://pae-paha.pacioos.hawaii.edu/erddap/info/dhw_5km/index.csv")
          echo "HTTP status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "ERDDAP unavailable (status $STATUS) — skipping render"
            exit 0
          fi
      - name: Render R Markdown
        shell: Rscript {0}
        run: |
          rmarkdown::render('sea_temps_ppb.Rmd', output_file = 'docs/index.html')

      - name: Commit updated data and HTML
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add bay.Rdata docs/index.html
          git diff --staged --quiet || git commit -m "Daily update $(date -u '+%Y-%m-%d')"
          git pull --rebase origin main
          git push
