name: Render and publish SST report

on:
  schedule:
    - cron: '0 23 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  render:
    runs-on: ubuntu-latest
    env:
      R_LIBS_USER: /home/runner/R/library 
      
    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: 'release'

      - uses: r-lib/actions/setup-pandoc@v2

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libcurl4-openssl-dev \
            libssl-dev \
            libxml2-dev \
            libfontconfig1-dev \
            libfreetype6-dev \
            libpng-dev \
            libtiff5-dev \
            libjpeg-dev \
            libharfbuzz-dev \
            libfribidi-dev \
            libnetcdf-dev \
            libudunits2-dev \
            libgdal-dev \
            libgeos-dev \
            libproj-dev

      - name: Install R packages
        run: |
          Rscript -e "install.packages(
            c('rmarkdown', 'knitr', 'tidyverse', 'ggsci', 'rerddap', 'giscoR'),
            repos = 'https://cloud.r-project.org'
          )"

      - name: Test ERDDAP connectivity
        run: |
          curl -s -o /dev/null -w "%{http_code}" \
            "https://pae-paha.pacioos.hawaii.edu/erddap/info/dhw_5km/index.csv"

      - name: Render R Markdown
        run: |
          Rscript -e "rmarkdown::render('sea_temps_ppb.Rmd', output_file = 'docs/index.html')"

      - name: Commit updated data and HTML
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add bay.Rdata docs/index.html
          git diff --staged --quiet || git commit -m "Daily update $(date -u '+%Y-%m-%d')"
          git push
          